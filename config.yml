baseURL: "https://timmyisnotfat.github.io/" 
title: Tim
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: GitHub
          url: https://github.com/timmyisnotfat
          weight: 1
        - name: Archive
          url: archive/
          weight: 2

params:
    description: "Personal website for Tim."
    author: Tim
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: []
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Tim
          subtitle: "Personal website for Tim. More updates coming soon."
          imageUrl: "https://github.com/timmyisnotfat.png"
          imageWidth: 160
          imageHeight: 160
          buttons:
            - name: Archive
              url: archive/
            - name: GitHub
              url: https://github.com/timmyisnotfat

    socialIcons:
        - name: GitHub
          url: https://github.com/timmyisnotfat

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Tim"
      icon: favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2
